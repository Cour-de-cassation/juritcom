---
- name: Creation de la ConfigMap de l'api
  k8s:
    apply: true
    state: present
    verify_ssl: true
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: api-config
        namespace: "{{ juritcom_namespace }}"
        labels:
          app: "{{ juritcom_application }}"
      data:
        DOC_LOGIN: "{{ doc_login }}"
        DBSDER_API_URL: "{{ dbsder_api_url }}"
        NO_COLOR: "{{ no_color }}"
        PORT: "{{ api_port }}"
        USE_AUTH: "{{ use_auth }}"
        JWT_PROVIDER_URL: "{{ jwt_provider_url }}"
        JWT_CLIENT_ID: "{{ jwt_client_id }}"
        JWT_TOKEN_URL: "{{ jwt_token_url }}"
        JWT_ISSUER: "{{ jwt_issuer }}"
        JWT_ACCEPTED_ISSUERS: "{{ jwt_accepted_issuers }}"
        JWT_ALGORITHM: "{{ jwt_algorithm }}"
        JWT_EXPIRATION_SECONDS: "{{ jwt_expiration_seconds }}"
...
